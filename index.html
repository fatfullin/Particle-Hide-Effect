<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Эффект частиц для элементов</title>
    
    <!-- Подключение стилей -->
    <link rel="stylesheet" href="src/css/styles.css">
    <style>
        #block1 {
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }
        .title-with-effect {
            margin-left: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Применение эффекта частиц к тексту</h1>
        
        <div class="demo-block" id="block1">
            <div class="controls">
                <button class="apply">Применить эффект</button>
                <button class="remove hidden">Удалить эффект</button>
            </div>
            <h2 class="title-with-effect" id="target-title">145 000 ₽</h2>
        </div>
    </div>
    
    <!-- Подключение JavaScript модулей -->
    <script type="module" src="src/js/app.js"></script>
</body>
</html>
