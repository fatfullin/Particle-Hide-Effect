<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Пример использования Particle Effect</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
            color: #333;
        }
        
        h1, h2 {
            text-align: center;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .demo-block {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            position: relative;
            min-height: 100px;
            text-align: left;
        }
        
        .target-element {
            position: relative;
            cursor: pointer;
            display: inline-block;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 2em;
            font-weight: bold;
            line-height: 1;
            padding: 0;
            height: auto;
            margin-left: 0;
        }
        
        button {
            padding: 8px 15px;
            margin: 5px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            transition: background-color 0.2s ease;
        }
        
        button:hover {
            background-color: #45a049;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Пример использования Particle Effect</h1>
        
        <div class="demo-block">
            <div class="target-element" id="target1">145 000 ₽</div>
        </div>
        
        <div class="controls">
            <button id="apply-btn">Применить эффект</button>
            <button id="remove-btn">Удалить эффект</button>
        </div>
    </div>
    
    <script type="module">
        import { createParticleEffect } from '../src/js/particle.js';
        
        document.addEventListener('DOMContentLoaded', () => {
            const targetElement = document.getElementById('target1');
            const applyBtn = document.getElementById('apply-btn');
            const removeBtn = document.getElementById('remove-btn');
            
            let effect = null;
            
            // Настройки для эффекта частиц
            const options = {
                particleCount: 1050,
                backgroundColor: 'rgba(255, 255, 255, 0.8)',
                particleColor: 'rgba(0, 0, 0, 0.7)',
                particleSize: { min: 0.36, max: 1.2 },
                speed: { min: 0.05, max: 0.15 },
                shrinkEdges: true,
                edgeMarginPixels: 10,
                useRetina: true,
                animateOpacity: true,
                useLifespan: true,
                lifespanMin: 500,
                lifespanMax: 1000,
                fadeTime: 300
            };
            
            // Применение эффекта
            applyBtn.addEventListener('click', () => {
                if (!effect) {
                    effect = createParticleEffect(targetElement, options);
                    console.log('Эффект частиц применен');
                }
            });
            
            // Удаление эффекта
            removeBtn.addEventListener('click', () => {
                if (effect) {
                    effect.destroy();
                    effect = null;
                    console.log('Эффект частиц удален');
                }
            });
        });
    </script>
</body>
</html>
